[platformio]
default_envs = teensy40

[env:teensy40]
platform = teensy
board = teensy40
framework = arduino

# Library dependencies
lib_deps =
    adafruit/Adafruit GFX Library@^1.11.9
    https://github.com/mjs513/GC9A01A_t3n.git
    paulstoffregen/Encoder@^1.4.4

# font-tester branch: compile ONLY the throwaway font tester, not the app
# (avoids the duplicate setup()/loop() from OScope.ino).  Revert on merge/delete.
build_src_filter =
    -<*>
    +<FontTest.cpp>

# Build flags for optimization
build_flags =
    -O2
    -DUSB_SERIAL

# Upload configuration
upload_protocol = teensy-gui
monitor_speed = 115200
